version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8080:8080"
    environment:
      APP_ENV: local
      CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:5173"
      GCP_PROJECT_ID: "agentcys-platform-local"
      SECRET_MANAGER_PROJECT: "agentcys-platform-local"
      STATE_MIRROR_BUCKET: "agentcys-platform-tf-state-mirror-local"
      BLUEPRINT_BUCKET: "agentcys-platform-blueprints-local"
      CLOUD_TASKS_QUEUE: "platform-worker-queue"
      CLOUD_TASKS_LOCATION: "us-central1"
      HMAC_SIGNING_SECRET: "local-dev-secret-replace-in-production-x"
      FIRESTORE_EMULATOR_HOST: "firestore-emulator:8088"
    depends_on:
      - firestore-emulator
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      APP_ENV: local
      GCP_PROJECT_ID: "agentcys-platform-local"
      SECRET_MANAGER_PROJECT: "agentcys-platform-local"
      STATE_MIRROR_BUCKET: "agentcys-platform-tf-state-mirror-local"
      BLUEPRINT_BUCKET: "agentcys-platform-blueprints-local"
      HMAC_SIGNING_SECRET: "local-dev-secret-replace-in-production-x"
      FIRESTORE_EMULATOR_HOST: "firestore-emulator:8088"
    depends_on:
      - firestore-emulator
    restart: "no"

  firestore-emulator:
    image: google/cloud-sdk:emulators
    command: >
      gcloud emulators firestore start
      --host-port=0.0.0.0:8088
      --project=agentcys-platform-local
    ports:
      - "8088:8088"
    restart: unless-stopped
